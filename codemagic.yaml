workflows:
  android-apk:
    name: Arise Up - Android APK
    max_build_duration: 60
    environment:
      node: 20.17.0
      vars:
        NODE_ENV: production
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Run Expo prebuild
        script: npx expo prebuild --platform android --clean --no-install
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - ravi2009u@gmail.com
        notify:
          success: true
          failure: true
